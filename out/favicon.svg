<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .letter-path {
      stroke: #00E5FF;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 45;
      stroke-dashoffset: 45;
      animation: drawAndPulse 1.8s ease-in-out infinite;
    }
    @keyframes drawAndPulse {
      0% {
        stroke-dashoffset: 45;
        opacity: 1;
      }
      35% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      65% {
        stroke-dashoffset: 0;
        opacity: 0.9;
      }
      90%, 100% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }
  </style>
  <rect width="32" height="32" rx="6" fill="#0A0A0C"/>
  <path d="M 8 9 L 14 16 L 14 23 M 20 9 L 14 16 M 24 9 L 24 23" class="letter-path"/>
</svg>
